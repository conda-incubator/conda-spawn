version: 2
updates:
  - package-ecosystem: github-actions
    directory: /.github/workflows
    schedule:
      interval: weekly
    groups:
      workflows:
        patterns:
          - '*'

  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
    groups:
      pre-commit:
        patterns:
          - '*'

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    groups:
      pip:
        patterns:
          - '*'
